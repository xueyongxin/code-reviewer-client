# 与 package.json → build 对齐；以 package.json 为准时请同步改此处
appId: com.codereviewer.client
productName: Code Reviewer Client
copyright: Copyright © Code Reviewer Client
directories:
  output: release
  buildResources: resources
files:
  - out/**/*
  - package.json
  - '!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}'
  - '!**/node_modules/*/{test,tests,__tests__,docs}/**'
asarUnpack:
  - '**/node_modules/better-sqlite3/**/*'
npmRebuild: false
buildDependenciesFromSource: false
protocols:
  name: Code Reviewer
  schemes:
    - codereviewer
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
win:
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
publish: null
